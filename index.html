<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-Patent Tools</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
    
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="app-container">
        <!-- Left Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>CHIP-Patent Tools</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-button active" data-view="home">
                    <span class="nav-icon">🏠</span>
                    Home
                </button>
                <button class="nav-button" data-view="download-publications">
                    <span class="nav-icon">📥</span>
                    Download Patent Publications
                </button>
                <button class="nav-button" data-view="file-wrapper-download">
                    <span class="nav-icon">📂</span>
                    USPTO File Wrapper Download
                </button>
                <button class="nav-button" data-view="generate-coversheet">
                    <span class="nav-icon">📄</span>
                    Generate Granted Patent Coversheet
                </button>
                <button class="nav-button" data-view="settings">
                    <span class="nav-icon">⚙️</span>
                    Settings
                </button>
            </nav>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <div class="content-header">
                <h1 id="content-title">CHIP-Patent Tools</h1>
            </div>
            <div class="content-body" id="content-body">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Loading...</p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
